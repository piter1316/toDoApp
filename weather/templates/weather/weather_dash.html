{% extends 'todo/base.html' %}

{% block body %}
<div class="pln-card p-4 shadow-sm border-0" style="background: rgba(30, 30, 30, 0.7); backdrop-filter: blur(10px); ">
    <h4 class="text-light mb-4"><i class="fas fa-cloud-sun mr-2"></i> Konfiguracja Pogody</h4>

    <div class="position-relative mb-5">
        <label class="text-light small">Znajdź swoją miejscowość lub szkołę:</label>
        <input type="text" id="station-search" class="form-control bg-dark text-light border-0 shadow-none"
               placeholder="Wpisz miasto lub nazwę stacji..." autocomplete="off">

        <div id="search-results" class="list-group position-absolute w-100 shadow-lg" style="z-index: 1000; max-height: 300px; overflow-y: auto; display: none;">
            </div>
    </div>

    <h6 class="text-muted text-uppercase small mb-3">Twoje lokalizacje:</h6>
       <div id="weather-grid-container">
            {% include 'weather/weather_grid.html' %}
       </div>
    </div>

    <style>
        /* Zapobieganie "skakaniu" karty przy hoverze i trzymanie równej wysokości */
        .pln-card {
            min-height: 140px;
        }

        /* Poprawka dla Bootstrap 4, jeśli nie masz g-4 w tej wersji */
        #weather-grid {
            margin-right: -10px;
            margin-left: -10px;
        }
        #weather-grid .col {
            padding-right: 10px;
            padding-left: 10px;
        }
    </style>
</div>

<script>
// Dane z backendu
const allStations = {{ all_stations_json|safe }};
const searchInput = document.getElementById('station-search');
const resultsDiv = document.getElementById('search-results');

searchInput.addEventListener('input', function() {
    const val = this.value.toLowerCase();
    resultsDiv.innerHTML = '';

    if (val.length < 2) {
        resultsDiv.style.display = 'none';
        return;
    }

    const matches = allStations.filter(s =>
        s.city.toLowerCase().includes(val) || s.name.toLowerCase().includes(val)
    ).slice(0, 10); // Tylko 10 wyników dla wydajności

    matches.forEach(s => {
        const item = document.createElement('button');
        item.className = 'list-group-item list-group-item-action bg-dark text-light border-secondary small py-2';
        item.innerHTML = `<strong>${s.city}</strong><br><span class="text-muted" style="font-size:0.75rem">${s.name}</span>`;
        item.onclick = () => addStation(s.id);
        resultsDiv.appendChild(item);
    });

    resultsDiv.style.display = matches.length ? 'block' : 'none';
});

function addStation(id) {
    const form = document.createElement('form');
    form.method = 'POST';
    form.innerHTML = `{% csrf_token %}<input type="hidden" name="action" value="add"><input type="hidden" name="station_id" value="${id}">`;
    document.body.appendChild(form);
    form.submit();
}

// Zamknij wyniki przy kliknięciu obok
document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target)) resultsDiv.style.display = 'none';
});

// Uniwersalna funkcja do obsługi akcji pogody przez AJAX
function handleWeatherAction(formData) {
    fetch(window.location.href, {
        method: 'POST',
        body: formData,
        headers: {
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': '{{ csrf_token }}'
        }
    })
    .then(response => response.json())
    .then(data => {
        // 1. Aktualizacja siatki lokalizacji
        if (data.html) {
            document.getElementById('weather-grid-container').innerHTML = data.html;
        }

        // 2. Aktualizacja paska menu (desktop i mobile)
        if (data.navbar_html !== undefined) {
            const navDesktop = document.getElementById('global-weather-desktop');
            const navMobile = document.getElementById('global-weather');

            if (navDesktop) navDesktop.innerHTML = data.navbar_html;
            if (navMobile) navMobile.innerHTML = data.navbar_html;
        }
    })
    .catch(error => console.error('Error:', error));
}

// Obsługa kliknięć w przyciski (Usuń, Pinezka) wewnątrz siatki
document.getElementById('weather-grid-container').addEventListener('click', function(e) {
    const btn = e.target.closest('button[name="action"]');
    if (btn) {
        e.preventDefault();
        const form = btn.closest('form');
        const formData = new FormData(form);
        formData.append('action', btn.value);
        handleWeatherAction(formData);
    }
});

// Twoja funkcja addStation też musi teraz używać AJAX:
function addStation(id) {
    const formData = new FormData();
    formData.append('action', 'add');
    formData.append('station_id', id);
    handleWeatherAction(formData);

    // Opcjonalnie zamknij wyniki wyszukiwania
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('station-search').value = '';
}
</script>
{% endblock %}
