{% extends 'todo/base.html' %}
{% block body %}

<style>
  .gen-viewport {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Szklana karta - adoptuje kolor tła body */
  .glass-terminal {
    background: rgba(30, 30, 30, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  }

  /* Wyświetlacz */
  .pass-display-v4 {
    background: rgba(0, 0, 0, 0.3);
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.6rem;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    letter-spacing: 1px;
    word-break: break-all;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Pasek jakości */
  .strength-progress {
    height: 4px;
    transition: all 0.4s ease;
    border-radius: 2px;
  }

  /* Stylowanie suwaka */
  .custom-range::-webkit-slider-thumb { background: #adb5bd; }
  .custom-range::-webkit-slider-thumb:active { background: #fff; }
</style>

<div class="gen-viewport">
  <div class="card glass-terminal p-2 w-100" style="max-width: 900px;">

    <div class="d-flex justify-content-between align-items-center px-3 py-2">
        <div class="d-flex" style="gap: 6px;">
            <div style="width: 10px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%;"></div>
            <div style="width: 10px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%;"></div>
            <div style="width: 10px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%;"></div>
        </div>
        <small class="text-muted font-weight-bold" style="letter-spacing: 1px;">Generator haseł</small>
    </div>

    <div class="card-body pt-2">
      <div class="mb-4">
        <div id="result" class="pass-display-v4 p-1 text-center mb-1">
          ********
        </div>
        <div class="progress bg-transparent" style="height: 4px;">
            <div id="strength-bar" class="strength-progress bg-danger" style="width: 0%"></div>
        </div>
      </div>

      <div class="px-2">
        <div class="form-group mb-4">
          <div class="d-flex justify-content-between text-light mb-2">
            <span class="small text-muted">DŁUGOŚĆ</span>
            <span id="chars_val" class="font-weight-bold">15</span>
          </div>
          <input type="range" class="custom-range" id="chars" min="8" max="36" value="15"
                 oninput="updateLength(this.value); generatePassword();">
        </div>

        <div class="row no-gutters mb-4">
          <div class="col-6">
            <div class="custom-control custom-switch">
              <input type="checkbox" class="custom-control-input" id="include_upper" checked onchange="generatePassword()">
              <label class="custom-control-label text-light small" for="include_upper">WIELKIE</label>
            </div>
          </div>
          <div class="col-6">
            <div class="custom-control custom-switch">
              <input type="checkbox" class="custom-control-input" id="include_numbers" checked onchange="generatePassword()">
              <label class="custom-control-label text-light small" for="include_numbers">CYFRY</label>
            </div>
          </div>
          <div class="col-12 mt-3">
            <div class="custom-control custom-switch">
              <input type="checkbox" class="custom-control-input" id="include_specials" checked onchange="generatePassword()">
              <label class="custom-control-label text-light small" for="include_specials" >ZNAKI SPECJALNE</label>
            </div>
          </div>
        </div>

        <div class="row mt-4 pb-2">
          <div class="col-7 pr-1">
            <button class="btn btn-light btn-block font-weight-bold shadow-sm" onclick="generatePassword()">
              NOWE HASŁO
            </button>
          </div>
          <div class="col-5 pl-1">
            <button class="btn btn-outline-secondary btn-block text-light border-secondary" onclick="copyToClipboard()" id="copy-btn">
              KOPIUJ
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function updateLength(val) {
    // Zakładam, że element o id 'chars_val' istnieje w Twoim HTML
    const valEl = document.getElementById('chars_val');
    if (valEl) valEl.innerText = val;
  }

  function generatePassword() {
    const length = document.getElementById('chars').value;
    const hasUpper = document.getElementById('include_upper').checked;
    const hasNumbers = document.getElementById('include_numbers').checked;
    const hasSpecials = document.getElementById('include_specials').checked;

    const lower = 'abcdefghijklmnopqrstuvwxyz';
    const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const numbers = '0123456789';
    const specials = '!@#$%^&*()_+~`|}{[]:;?><,./-=';

    let pool = lower;
    if (hasUpper) pool += upper;
    if (hasNumbers) pool += numbers;
    if (hasSpecials) pool += specials;

    let password = '';
    for (let i = 0; i < length; i++) {
      password += pool.charAt(Math.floor(Math.random() * pool.length));
    }

    const resultEl = document.getElementById('result');
    resultEl.innerText = password;

    // Wywołanie paska jakości
    updateStrength(length, hasUpper, hasNumbers, hasSpecials);
  }

  function updateStrength(len, up, num, spec) {
    const bar = document.getElementById('strength-bar');
    if (!bar) return;

    let strength = 0;
    strength += (len * 2.5); // Długość ma największe znaczenie
    if (up) strength += 10;
    if (num) strength += 15;
    if (spec) strength += 25;

    const percent = Math.min(strength, 100);
    bar.style.width = percent + '%';

    if (percent < 45) {
      bar.className = 'strength-progress bg-danger';
    } else if (percent < 75) {
      bar.className = 'strength-progress bg-warning';
    } else {
      bar.className = 'strength-progress bg-success';
    }
  }

  function copyToClipboard() {
    const resultEl = document.getElementById('result');
    const text = resultEl.innerText;

    // POPRAWKA: Sprawdzamy czy to dokładnie placeholder, a nie czy zawiera gwiazdkę
    if (text === '********' || text === '') return;

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      if (!btn) return;

      const originalText = btn.innerText;
      btn.innerText = 'OK!';

      // Obsługa klas Bootstrapa dla feedbacku (jeśli ich używasz)
      const isOutline = btn.classList.contains('btn-outline-secondary');
      if (isOutline) {
          btn.classList.replace('btn-outline-secondary', 'btn-success');
      }

      setTimeout(() => {
        btn.innerText = originalText;
        if (isOutline) {
            btn.classList.replace('btn-success', 'btn-outline-secondary');
        }
      }, 1000);
    }).catch(err => {
      console.error('Błąd kopiowania: ', err);
    });
  }

  // Inicjalizacja przy załadowaniu
  window.addEventListener('DOMContentLoaded', () => {
    generatePassword();
  });
</script>

{% endblock %}
