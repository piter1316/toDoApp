{% widthratio spent budget 100 as percent_raw %}
{% if budget %}
  <div class="w-100">
      <div class="progress {% if is_dashboard %}progress-thin{% else %}progress-medium{% endif %} position-relative"
           style="background-color: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; height: {% if is_dashboard %}3px{% else %}16px{% endif %} !important;">

          <div class="progress-bar"
               role="progressbar"
               style="width: {% if percent_raw|add:0 > 100 %}100{% else %}{{ percent_raw }}{% endif %}%;
                      transition: width 0.8s ease;
                      background-color: {% if percent_raw|add:0 <= 50 %}#8eb091{% elif percent_raw|add:0 <= 75 %}#889cb5{% elif percent_raw|add:0 <= 90 %}#d6c19d{% elif percent_raw|add:0 <= 100 %}#c299a9{% else %}#a89387{% endif %};">
          </div>

          {% if not is_dashboard %}
            <small class="d-flex justify-content-center align-items-center w-100 h-100 position-absolute"
                   style="top: 0; left: 0; font-size: 0.65rem; font-weight: 800; pointer-events: none;

                          /* DYNAMICZNY KOLOR TEKSTU: Ciemny dla 75%-100% (złoty i różowy), biały dla reszty */
                          color: {% if percent_raw|add:0 > 75 and percent_raw|add:0 <= 100 %}#212529{% else %}white{% endif %};

                          /* DYNAMICZNY CIEŃ: Cień tylko dla białego tekstu, usuwamy dla ciemnego */
                          text-shadow: {% if percent_raw|add:0 > 75 and percent_raw|add:0 <= 100 %}none{% else %}1px 1px 2px rgba(0,0,0,0.5){% endif %};">

                Wykorzystanie: {{ percent_raw }}%
            </small>
          {% endif %}
      </div>
  </div>
{% endif %}
